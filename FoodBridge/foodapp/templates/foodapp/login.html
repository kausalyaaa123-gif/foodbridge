<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FoodBridge</title>
    <style>
        /* 1. Reset and Center Everything on the Screen */
        body {
            display: flex;
            justify-content: center; /* Center horizontally */
            align-items: center;     /* Center vertically */
            height: 100vh;           /* Full viewport height */
            margin: 0;
            background-color: #f4f7f6; /* Light gray background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 2. The White Card Container */
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); /* Subtle shadow */
            text-align: center;
            width: 350px; /* Fixed professional width */
        }

        /* 3. Title Styling (Using FoodBridge Green) */
        .login-card h2 {
            color: #2ecc71;
            margin-bottom: 25px;
            font-weight: 600;
        }

        /* 4. Input Field Styling */
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; /* Crucial: ensures padding doesn't affect width */
            font-size: 1em;
        }

        /* 5. Login Button (Solid Green) */
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1em;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background-color: #27ae60;
        }

        /* 6. The "OR" Divider */
        .divider {
            margin: 25px 0;
            border-top: 1px solid #eee;
            position: relative;
        }
        .divider span {
            position: absolute;
            top: -12px;
            background: white;
            padding: 0 15px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 0.9em;
        }

        /* 7. Register Button (Outline Green) */
        .btn-register {
            display: block;
            text-decoration: none;
            color: #2ecc71;
            font-weight: bold;
            border: 2px solid #2ecc71;
            padding: 10px;
            border-radius: 8px;
            transition: all 0.3s;
            margin-top: 15px;
        }
        .btn-register:hover {
            background-color: #2ecc71;
            color: white;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>FoodBridge Login</h2>
        
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn-login">Login</button>
        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <p style="color: #666; font-size: 0.9em; margin-bottom: 5px;">Don't have an account?</p>
        
        <a href="{% url 'signup' %}" class="btn-register">Register / Create Account</a>
    </div>

</body>
</html>
