<!DOCTYPE html>
<html>
<head>
    <title>Donate Food - FoodBridge</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .form-container { background: white; max-width: 600px; margin: 0 auto; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #2ecc71; text-align: center; }
        input, button, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-family: inherit; }
        button { background: #2ecc71; color: white; border: none; cursor: pointer; font-weight: bold; padding: 12px; }
        button:hover { background: #27ae60; }
        .location-status { font-size: 0.9em; color: #666; text-align: center; margin: 10px 0; padding: 10px; background: #ecf0f1; border-radius: 5px; }
        .location-status.success { color: #27ae60; background: #d5f4e6; }
        .location-status.error { color: #e74c3c; background: #fadbd8; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Donate Surplus Food</h2>
        <form method="POST" enctype="multipart/form-data" id="donateForm">
            {% csrf_token %}
            <input type="text" name="food_name" placeholder="Food Item Name (e.g. Rice, Bread)" required>
            <input type="number" step="0.1" name="quantity" placeholder="Quantity (e.g. 2.5 kg)" required>
            
            <label>Food Image:</label>
            <input type="file" name="food_image" accept="image/*" required>

            <!-- Hidden location fields -->
            <input type="hidden" name="lat" id="lat" value="0.0">
            <input type="hidden" name="lon" id="lon" value="0.0">
            
            <!-- Location status message -->
            <div class="location-status" id="locationStatus">🔍 Detecting your location...</div>

            <button type="submit" id="submitBtn">Post Donation</button>
        </form>
    </div>

    <script>
        function getLocation() {
            const statusEl = document.getElementById('locationStatus');
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        
                        document.getElementById('lat').value = lat;
                        document.getElementById('lon').value = lon;
                        
                        statusEl.className = 'location-status success';
                        statusEl.textContent = `✅ Location captured: ${lat.toFixed(4)}°, ${lon.toFixed(4)}°`;
                    },
                    function(error) {
                        statusEl.className = 'location-status error';
                        switch(error.code) {
                            case error.PERMISSION_DENIED:
                                statusEl.textContent = '❌ Location permission denied. Please enable location access in browser settings.';
                                break;
                            case error.POSITION_UNAVAILABLE:
                                statusEl.textContent = '❌ Location unavailable. Please check your GPS/network.';
                                break;
                            case error.TIMEOUT:
                                statusEl.textContent = '❌ Location request timed out.';
                                break;
                            default:
                                statusEl.textContent = '❌ Could not get location.';
                        }
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    }
                );
            } else {
                statusEl.className = 'location-status error';
                statusEl.textContent = '❌ Geolocation not supported in your browser.';
            }
        }

        // Get location when page loads
        window.addEventListener('load', function() {
            getLocation();
        });

        // Optionally retrigger location on form submit if still detecting
        document.getElementById('donateForm').addEventListener('submit', function(e) {
            const status = document.getElementById('locationStatus');
            if (document.getElementById('lat').value === '0.0' || document.getElementById('lon').value === '0.0') {
                if (!confirm('Location not captured. Submit anyway?')) {
                    e.preventDefault();
                }
            }
        });
    </script>
</body>
</html>
